<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인</title>
  <meta name="robots" content="noindex" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="icon" href="data:," />
  <script>
    (() => {
      const saved = localStorage.getItem('promptdeck_theme');
      const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      document.documentElement.dataset.theme = saved || (prefersDark ? 'dark' : 'light');
    })();
  </script>
  <link rel="stylesheet" href="styles/login.css" />
  <script src="src/auth.js"></script>
</head>
<body>

<div class="login-card">
  <div class="login-logo">
    <div class="login-logo-mark" id="loginLogoMark">PD</div>
    <div>
      <h1 class="login-app-name" id="loginAppName">PromptDeck</h1>
      <p class="login-app-sub" id="loginAppSub">이미지 프롬프트 설계 워크스페이스</p>
    </div>
  </div>

  <form id="loginForm">
    <div class="login-field">
      <label for="loginUsername">아이디</label>
      <input
        type="text"
        id="loginUsername"
        class="login-input"
        placeholder="아이디 입력"
        autocomplete="username"
        required
      />
    </div>
    <div class="login-field">
      <label for="loginPassword">비밀번호</label>
      <input
        type="password"
        id="loginPassword"
        class="login-input"
        placeholder="비밀번호 입력"
        autocomplete="current-password"
        required
      />
    </div>
    <div class="login-error" id="loginError"></div>
    <button type="submit" class="login-btn" id="loginSubmit">로그인</button>
  </form>

  <div class="login-footer">
    <a href="index.html">앱으로 돌아가기</a>
  </div>
</div>

<script>
(function () {
  'use strict';

  var ADMIN_SK = 'promptdeck_admin';

  function getAdminSettings() {
    try { return JSON.parse(localStorage.getItem(ADMIN_SK) || '{}'); } catch (e) { return {}; }
  }

  function getReturnUrl() {
    var params = new URLSearchParams(window.location.search);
    var ret = params.get('return') || 'index.html';
    // 보안: 외부 URL 허용 안 함
    if (/^https?:\/\//i.test(ret)) return 'index.html';
    return ret;
  }

  document.addEventListener('DOMContentLoaded', function () {
    // 이미 로그인된 경우 리다이렉트
    if (PromptDeckAuth.loadSession()) {
      window.location.href = getReturnUrl();
      return;
    }

    // 앱 이름 반영
    var s = getAdminSettings();
    if (s.programName) {
      document.title = s.programName + ' 로그인';
      var nameEl = document.getElementById('loginAppName');
      if (nameEl) nameEl.textContent = s.programName;
    }
    if (s.programSubtitle) {
      var subEl = document.getElementById('loginAppSub');
      if (subEl) subEl.textContent = s.programSubtitle;
    }

    var form    = document.getElementById('loginForm');
    var errEl   = document.getElementById('loginError');
    var submitBtn = document.getElementById('loginSubmit');

    form.addEventListener('submit', async function (e) {
      e.preventDefault();
      var username = document.getElementById('loginUsername').value;
      var password = document.getElementById('loginPassword').value;

      errEl.textContent = '';
      submitBtn.disabled = true;
      submitBtn.textContent = '로그인 중...';

      try {
        // 서버 없는 환경(Netlify 등)이면 인증 건너뜀
        var isServer = await PromptDeckAuth.detectServer();
        if (!isServer) {
          window.location.href = getReturnUrl();
          return;
        }

        var session = await PromptDeckAuth.login(username, password);
        if (!session) {
          errEl.textContent = '아이디 또는 비밀번호가 올바르지 않습니다.';
          return;
        }
        window.location.href = getReturnUrl();
      } catch (err) {
        errEl.textContent = err.message || '로그인 중 오류가 발생했습니다.';
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = '로그인';
      }
    });
  });
})();
</script>
</body>
</html>
